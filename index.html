<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Coiny&family=DynaPuff:wght@400..700&family=Kumar+One+Outline&family=Londrina+Outline&family=Londrina+Shadow&family=Londrina+Sketch&family=Miltonian&family=Sansita+Swashed:wght@300..900&display=swap" rel="stylesheet">
    <title>login page</title>
</head>

<body>
    <div class="nav">
        <div class="app-icon">
            <i class="fa-brands fa-instagram"></i>
            <h1 class="sansita-swashed-uniquifier">Instagram</h1>
        </div>
        <div class="icons">
            <i class="fa-solid fa-bars"></i>
           <i class="fa-regular fa-circle-question"></i>
            <h3>help</h3>
        </div>

    </div>
    <div class="input">
        <form>
           
            <input type="text" id="name" placeholder="Enter Name" ><i class="fa-solid fa-user " style="color: rgba(226, 225, 225, 0.356); top: 65px;"></i>
            <br>
            <input type="password" placeholder="Enter Password"><i class="fa-solid fa-lock" style="color: rgba(231, 229, 229, 0.356);top: 165px;"></i>
            <br>
            <select id="country" name="country" >
                
                <option >choose country</option>
              <option value="australia">Australia</option>
               <option value="canada">Canada</option>
              <option value="usa">USA</option>
            </select>

        </form>
        <div class="remember-forgot">
            <p style="color: beige;">Remember password</p>
            <a href="#forgot password">Forgot password?</a>
        </div>
        <div class="button">
            <button id="B">LOGIN</button>
        </div>
    </div>

</body>

</html>
